events {
    worker_connections 1024;
}

http {
    # Include mime types so CSS/JS files are recognized correctly
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name bookshop.local;

        # 1. NestJS Backend Proxy
        # Redirects bookshop.local/api/... to the backend container
        location /api/ {
            # Use the container name from docker-compose
            proxy_pass http://backend:3000;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Angular Frontend Proxy
        # Redirects all other traffic to the frontend Nginx container
        location / {
            # Note: Production frontend container now listens on port 80
            proxy_pass http://frontend:80;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
