<div class="w-fit" *transloco="let t">
  @if (hasDiscount()) {
    <div class="rounded-lg overflow-hidden border border-dashed border-warning/60 bg-warning/5 flex flex-col items-stretch">

      <div class="bg-warning px-2 py-0.5 text-center">
        <span class="font-bold uppercase text-[10px] tracking-tight text-warning-content leading-none">
          {{ t('pricing.discount_price') }} -{{ discountPercentage() }}%
        </span>
      </div>

      <div class="px-3 py-1.5 flex flex-col items-center gap-0.5">
        <span class="text-xl font-black text-error leading-tight">
          {{ discountedPrice() | number:'1.2-2' }} €
        </span>

        <span class="text-success font-bold text-[9px] border-t border-warning/20 pt-1 w-full text-center uppercase tracking-tighter">
          {{ t('pricing.you_save') }} {{ savedAmount() | number:'1.2-2' }} €
        </span>
      </div>

    </div>
  } @else {
    <div class="flex flex-col items-stretch">
      <div class="px-2 py-0.5 opacity-0 select-none">
        <span class="text-[10px] leading-none">SPACER</span>
      </div>

      <div class="px-3 py-1.5 flex flex-col items-center">
        <span class="text-xl font-black text-base-content leading-tight">
          {{ price() | number:'1.2-2' }} €
        </span>
        <span class="text-[9px] pt-1 opacity-0 select-none uppercase tracking-tighter">
          SPACER
        </span>
      </div>
    </div>
  }
</div>
