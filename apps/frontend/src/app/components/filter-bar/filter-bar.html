<div class="hidden md:block" *transloco="let t">
  <ul class="flex items-center gap-x-4 pb-3">

    <li>
      <button (click)="updateFilter('type', 'BOOK')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#F075AE] border-[#F075AE] hover:bg-[#F075AE] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Books
      </button>
    </li>

    <li>
      <button (click)="updateFilter('type', 'GAME')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#85cee0] border-[#85cee0] hover:bg-[#85cee0] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Games
      </button>
    </li>

    <li>
      <button (click)="updateFilter('type', 'GASTRO')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#89b847] border-[#89b847] hover:bg-[#89b847] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Gastro
      </button>
    </li>

    <li>
      <button (click)="updateFilter('type','PUZZLE')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#ffa64d] border-[#ffa64d] hover:bg-[#ffa64d] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Puzzle
      </button>
    </li>

    <li>
      <button (click)="updateFilter('type', 'CARDS')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#a08ac1] border-[#a08ac1] hover:bg-[#a08ac1] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Cards
      </button>
    </li>

    <li>
      <button (click)="updateFilter('type', 'TOYS')"
              class="btn btn-sm rounded-full btn-outline font-ribeye text-[#bc9076] border-[#bc9076] hover:bg-[#bc9076] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
        Toys
      </button>
    </li>

    @if (store.isLoggedIn()) {
      <li>
        <button routerLink="/profile"
                class="btn btn-sm rounded-full btn-outline font-ribeye text-[#ff6666] border-[#ff6666] hover:bg-[#ff6666] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
          {{ t('filters.bar.profile') }}
        </button>
      </li>
    }

    @if (store.isAdmin()) {
      <li>
        <button routerLink="/administration"
                class="btn btn-sm rounded-full btn-outline font-ribeye text-[#96bfff] border-[#96bfff] hover:bg-[#96bfff] hover:text-white hover:scale-110 transition-all duration-200 normal-case text-base tracking-wider px-4">
          {{ t('filters.bar.admin') }}
        </button>
      </li>
    }

  </ul>
</div>
