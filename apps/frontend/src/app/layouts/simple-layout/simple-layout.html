<!-- 1. The main wrapper locks to exactly the window height and prevents body scrolling -->
<div class="h-screen w-full flex flex-col overflow-hidden">

  <!-- 2. Navbar is no longer 'sticky', it's just a static block that sits at the top of the flex column -->
  <app-navbar class="z-50 shrink-0"></app-navbar>

  <!-- 3. This div becomes the scrollable container.
       overscroll-y-contain enforces the bounce effect natively inside this box -->
  <div id="main-scroll-area" class="flex-1 overflow-y-auto overscroll-y-contain flex flex-col bg-base-200">

    <div class="flex flex-grow relative">

      <!-- Removed bg-base-200 here since it's on the parent scroll wrapper now -->
      <main class="flex-grow p-6 min-w-0">
        <router-outlet></router-outlet>
        <app-toast />
      </main>

    </div>

    <app-footer></app-footer>

  </div>

  <app-scroll-btn />
</div>
