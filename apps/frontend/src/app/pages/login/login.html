<div class="min-h-screen flex items-center justify-center">
    <app-toast />

  <div class="card w-full rounded-[40px] max-w-sm bg-base-100/80 shadow-2xl backdrop-blur-md border border-white/20">
    <div class="card-body">

      <div class="flex justify-center mb-4">
        <div class="bg-primary/20 p-4 rounded-full">
          <img src="/images/stack-of-books.png" width="80" height="80" alt="Stack of books" />
        </div>
      </div>

      <h3 class="card-title text-xl font-bold justify-center mb-2">Welcome Back</h3>

      <form (submit)="onLogin(); $event.preventDefault()">
        <div class="form-control w-full">
          <label for="username" class="label">
            <span class="label-text font-semibold">Username</span>
          </label>

          <label appNoFocusJump class="input input-bordered flex items-center gap-2 w-full">
            <svg lucideCircleUserRound size="20"></svg>
            <input
              type="text"
              class="grow"
              placeholder="User name"
              [(ngModel)]="username"
              name="username"
              required
              minLength="3"
              maxLength="50"
            />
          </label>
        </div>

        <div class="card-actions mt-8">
          <button
            type="submit"
            name="login"
            class="btn btn-primary btn-block text-white"
            [disabled]="!username() || store.isLoading()"
          >
            @if (store.isLoading()) {
              <span class="loading loading-spinner"></span>
            }
            Login
          </button>
        </div>
      </form>

      <div class="mt-6 text-center text-xs text-base-content/50 uppercase tracking-widest font-medium">
        <a routerLink="/">Continue without login</a>
      </div>
    </div>
  </div>
</div>
